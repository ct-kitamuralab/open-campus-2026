name: Build research map analysis

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-research-map-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build research map analysis data
        run: node tools/build-research-map-data.js

      - name: Commit updated analysis data
        run: |
          if git diff --quiet -- data/research-map-analysis.json; then
            echo "research-map-analysis.json is up to date"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/research-map-analysis.json
          git commit -m "Update research map analysis data"
          git push
